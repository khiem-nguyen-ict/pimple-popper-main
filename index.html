  <body
    onload="initGame()"
    onmousemove="onMouseMove(event)"
    ontouchstart="onTouchStart(event)"
    ondragstart="return false;" 
    ondrop="return false;"
    ondblclick="return false;"
    oncontextmenu="return false;"
  >
    <div class="bgimg" style="background-image: url('./img/girl-01.webp')">
      <div
        id="home"
        class="center"
        style="text-align: center"
        onclick="startGame()"
      >
        <img
          loading="lazy"
          src="./img/logo.webp"
          class="game-logo game-interactable"
        />
      </div>
      <div
        id="game-board"
        class="center label"
        style="text-align: center; display: none"
        onclick="resetGame()"
      ></div>
    </div>
    <div id="game-area" class="center" style="display: none">
      <img src="./img/girl-pt-01.webp" id="game-obj" />
    </div>
    <div id="game-controls" style="display: none">
      <div id="timer" class="label label-left">05:58</div>
      <div id="score" class="label label-right">--/--</div>
    </div>
    <div class="container">
      <div id="branding-logo" onclick="openBrandingLink()"></div>
    </div>

    <img src="./img/acnacare.webp" id="product" class="shadow-filter" />

    <audio id="soundPop" src="./audio/pop.mp3"></audio>
    <audio id="squelching01" src="./audio/squelching-01.mp3"></audio>
    <audio id="squelching02" src="./audio/squelching-02.mp3"></audio>
    <audio id="squelching03" src="./audio/squelching-03.mp3"></audio>
    <audio id="squelching04" src="./audio/squelching-04.mp3"></audio>

    <audio id="bg-music-00" loop>
      <source src="./audio/Game_Time_mp3_1703587883.mp3" type="audio/mpeg" />
    </audio>

    <audio id="bg-music-01" loop>
      <source src="./audio/desolate-world-121196.mp3" type="audio/mpeg" />
    </audio>

    <audio id="bg-music-02" loop>
      <source
        src="./audio/Hero_Challenge_mp3_1710900853.mp3"
        type="audio/mpeg"
      />
    </audio>
  </body>
